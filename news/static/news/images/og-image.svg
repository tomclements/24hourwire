<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0A2540;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E3A5F;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- Network/Wire Icon -->
  <g transform="translate(600, 180)">
    <!-- Connection lines -->
    <line x1="0" y1="0" x2="-80" y2="-40" stroke="#1E3A5F" stroke-width="3"/>
    <line x1="0" y1="0" x2="80" y2="-40" stroke="#1E3A5F" stroke-width="3"/>
    <line x1="0" y1="0" x2="-60" y2="50" stroke="#1E3A5F" stroke-width="3"/>
    <line x1="0" y1="0" x2="60" y2="50" stroke="#1E3A5F" stroke-width="3"/>
    <line x1="0" y1="0" x2="0" y2="-80" stroke="#1E3A5F" stroke-width="3"/>
    
    <!-- Central node -->
    <circle cx="0" cy="0" r="20" fill="#0066cc"/>
    
    <!-- Surrounding nodes -->
    <circle cx="-80" cy="-40" r="12" fill="#0066cc"/>
    <circle cx="80" cy="-40" r="12" fill="#0066cc"/>
    <circle cx="-60" cy="50" r="12" fill="#0066cc"/>
    <circle cx="60" cy="50" r="12" fill="#0066cc"/>
    <circle cx="0" cy="-80" r="12" fill="#0066cc"/>
  </g>
  
  <!-- Title -->
  <text x="600" y="380" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="#FFFFFF" text-anchor="middle">24HourWire</text>
  
  <!-- Subtitle -->
  <text x="600" y="450" font-family="Arial, sans-serif" font-size="36" fill="#CBD5E1" text-anchor="middle">The Latest News from All Angles</text>
  
  <!-- Tagline -->
  <text x="600" y="510" font-family="Arial, sans-serif" font-size="24" fill="#718096" text-anchor="middle">Unbiased. Multi-perspective. Always current.</text>
</svg>
