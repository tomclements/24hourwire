<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} | 24HourWire</title>
    <meta name="description" content="Curated by 24HourWire - news from all angles. Read the full story at {{ source }}.">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="article">
    <meta property="og:url" content="https://24hourwire.news/go/{{ token }}/">
    <meta property="og:title" content="{{ title }}">
    <meta property="og:description" content="Curated by 24HourWire - news from all angles">
    <meta property="og:site_name" content="24HourWire">
    <meta property="og:image" content="https://24hourwire.news/static/news/images/logo.jpg">
    <meta property="og:image:alt" content="24HourWire - News from all angles">
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:site" content="@24HourWire">
    <meta name="twitter:domain" content="24hourwire.news">
    <meta name="twitter:title" content="{{ title }}">
    <meta name="twitter:description" content="Curated by 24HourWire - news from all angles">
    <meta name="twitter:image" content="https://24hourwire.news/static/news/images/logo.jpg">
    <meta name="twitter:image:alt" content="24HourWire - News from all angles">
    
    <!-- Canonical -->
    <link rel="canonical" href="https://24hourwire.news/go/{{ token }}/">
    
    <!-- Favicon -->
    <link rel="icon" type="image/jpeg" href="/static/news/images/logo.jpg">
    
    <!-- No meta refresh - crawlers need to read OG tags before redirect -->
    
    <style>
        :root {
            --primary: #0A2540;
            --accent: #0066cc;
            --text-primary: #1a1a1a;
            --text-secondary: #4a5568;
            --text-muted: #718096;
            --bg-primary: #ffffff;
            --bg-secondary: #f7fafc;
            --border: #e2e8f0;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, var(--bg-secondary) 0%, #edf2f7 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            line-height: 1.6;
        }
        
        .container {
            background: var(--bg-primary);
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 100%;
            padding: 40px;
            text-align: center;
        }
        
        .brand {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 32px;
        }
        
        .brand img {
            width: 48px;
            height: 48px;
            border-radius: 8px;
        }
        
        .brand-text {
            text-align: left;
        }
        
        .brand-text h1 {
            font-size: 1.5rem;
            color: var(--primary);
            margin: 0;
        }
        
        .brand-text p {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin: 0;
        }
        
        .story-card {
            background: var(--bg-secondary);
            border-radius: 8px;
            padding: 24px;
            margin-bottom: 24px;
            text-align: left;
            border: 1px solid var(--border);
        }
        
        .source {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 8px;
        }
        
        .title {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-primary);
            line-height: 1.4;
        }
        
        .redirect-msg {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 24px;
        }
        
        .redirect-msg .countdown {
            color: var(--accent);
            font-weight: 600;
        }
        
        .actions {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s;
            cursor: pointer;
            border: none;
        }
        
        .btn-primary {
            background: var(--accent);
            color: white;
        }
        
        .btn-primary:hover {
            background: var(--primary);
            transform: translateY(-1px);
        }
        
        .btn-secondary {
            background: #edf2f7;
            color: var(--text-primary);
        }
        
        .btn-secondary:hover {
            background: var(--border);
        }
        
        @media (max-width: 480px) {
            .container { padding: 24px; }
            .title { font-size: 1.1rem; }
            .actions { flex-direction: column; }
            .btn { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="brand">
            <img src="/static/news/images/logo.jpg" alt="24HourWire">
            <div class="brand-text">
                <h1>24HourWire</h1>
                <p>News from all angles</p>
            </div>
        </div>
        
        <div class="story-card">
            <div class="source">Source: {{ source }}</div>
            <h2 class="title">{{ title }}</h2>
        </div>
        
        <p class="redirect-msg">
            Redirecting to <strong>{{ source }}</strong> in <span class="countdown" id="countdown">2</span> seconds...
        </p>
        
        <div class="actions">
            <a href="{{ url }}" class="btn btn-primary">Read Now &rarr;</a>
            <a href="/" class="btn btn-secondary">Explore 24HourWire</a>
        </div>
    </div>
    
    <script>
        // Redirect after 2 seconds using JavaScript
        // This ensures crawlers (Twitterbot, Facebook) read our OG tags
        // before being redirected to the original article
        let seconds = 2;
        const el = document.getElementById('countdown');
        const timer = setInterval(() => {
            seconds--;
            if (el) el.textContent = seconds;
            if (seconds <= 0) {
                clearInterval(timer);
                window.location.href = '{{ url|escapejs }}';
            }
        }, 1000);
    </script>
</body>
</html>
