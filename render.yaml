# Render configuration file
# This defines how your services are built and deployed
# Place this file in the root of your repository

services:
  # Web service
  - type: web
    name: 24hourwire
    runtime: python
    plan: free
    buildCommand: |
      chmod +x build_validation.sh &&
      ./build_validation.sh &&
      pip install -r requirements.txt &&
      python manage.py collectstatic --no-input
    startCommand: gunicorn core.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: 24hourwire-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: CSRF_TRUSTED_ORIGINS
        value: https://24hourwire.com,https://www.24hourwire.com,https://two4hourwire.onrender.com
      - key: WEB_CONCURRENCY
        value: 2

  # Cron job for fetching news
  - type: cron
    name: 24hourwire-fetch
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python manage.py fetch_news
    schedule: "0,15,30,45 * * * *"  # Every 15 minutes
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: 24hourwire-db
          property: connectionString
      - key: SECRET_KEY
        fromService:
          type: web
          name: 24hourwire
          envVarKey: SECRET_KEY

databases:
  - name: 24hourwire-db
    plan: free
    ipAllowList: []